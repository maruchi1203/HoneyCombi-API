services:
  postgres:
    image: postgres:16-alpine
    container_name: gguljohab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gguljohab
      POSTGRES_PASSWORD: gguljohab_pw
      POSTGRES_DB: gguljohab_dev
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gguljohab -d gguljohab_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
